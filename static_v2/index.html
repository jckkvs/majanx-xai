<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MajanX-XAI v2 — 雀魂スタイル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/tiles.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">雀</div>
            <h1>MAJANX<span class="xai">-XAI</span></h1>
            <p id="loading-msg">サーバーに接続中...</p>
        </div>
    </div>

    <!-- Stage Wrapper for scaling -->
    <div id="game-stage">
        <header class="top-bar">
            <div class="round-info">
                <span class="round-wind" id="round-display">東1局</span>
                <span class="remain-tiles">壁牌: <b id="remain-count">--</b></span>
            </div>
            <div class="score-row">
                <div class="score-chip you" id="score-0"><span class="sc-name">自家</span><span class="sc-val" id="score-val-0">25000</span></div>
                <div class="score-chip" id="score-1"><span class="sc-name">下家</span><span class="sc-val" id="score-val-1">25000</span></div>
                <div class="score-chip" id="score-2"><span class="sc-name">対面</span><span class="sc-val" id="score-val-2">25000</span></div>
                <div class="score-chip" id="score-3"><span class="sc-name">上家</span><span class="sc-val" id="score-val-3">25000</span></div>
            </div>
        </header>

        <main class="board">
            <section class="opp-area opp-toimen" id="player-2">
                <div class="opp-hand-horiz" id="hand-2"></div>
                <div class="opp-melds" id="melds-2"></div>
            </section>

            <section class="side-opp side-opp-left" id="player-3">
                <div class="opp-hand-vert opp-vert" id="hand-3"></div>
                <div class="opp-melds" id="melds-3"></div>
            </section>

            <section class="table-center">
                <div class="river-zone">
                    <div class="river-row" id="river-2"></div>
                    <div class="river-mid">
                        <div class="river-col" id="river-3"></div>
                        <div class="center-shield">
                            <span class="compass-dir" id="compass-n">北</span>
                            <div class="river-mid">
                                <span class="compass-dir" id="compass-w">西</span>
                                <div class="compass-mid" style="flex-direction:column">
                                    <div id="shield-round" style="font-size:18px;font-weight:900;color:var(--accent-gold)">東1</div>
                                    <div id="shield-remain" style="font-size:14px;color:var(--text-secondary)">--</div>
                                </div>
                                <span class="compass-dir" id="compass-e">東</span>
                            </div>
                            <span class="compass-dir" id="compass-s">南</span>
                        </div>
                        <div class="river-col" id="river-1"></div>
                    </div>
                    <div class="river-row" id="river-0"></div>
                </div>
            </section>

            <section class="side-opp side-opp-right" id="player-1">
                <div class="opp-hand-vert opp-vert" id="hand-1"></div>
                <div class="opp-melds" id="melds-1"></div>
            </section>
        </main>

        <footer class="my-area" id="player-0">
            <div id="melds-0" class="my-melds-zone"></div>
            <div id="hand-0" class="hand-container"></div>
        </footer>

        <div class="my-controls">
            <button class="ctrl-btn" id="btn-riichi" disabled>リーチ</button>
            <button class="ctrl-btn primary" id="btn-tsumo" disabled>打牌</button>
            <button class="ctrl-btn" id="btn-kan" disabled>カン</button>
            <button class="ctrl-btn" id="btn-ron" disabled>ロン</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="win-modal" class="modal hidden">
        <div class="modal-card">
            <h1 id="win-title" style="color:var(--accent-gold);margin-bottom:20px">和了!</h1>
            <div id="win-details" style="margin-bottom:30px"></div>
            <button class="ctrl-btn primary" onclick="location.reload()">次局へ</button>
        </div>
    </div>

    <script src="/js/tile-map.js"></script>
    <script src="/js/renderer.js"></script>
    <script src="/js/game-client.js"></script>
</body>
</html>
