<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>majanx MVP</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
  <div id="game-board">
    <div id="status-bar">
      <span id="turn-info">接続中...</span>
      <span id="score-display"></span>
    </div>
    
    <div id="opponents-info">
      <!-- 簡略化のため相手の情報は一旦最低限表示 -->
      <div class="opponent-hand" id="opp-2"></div>
    </div>
    
    <div id="discards-area">
      <div id="discards-p2" class="discards-row"></div>
      <div id="discards-p3" class="discards-row"></div>
      <div id="discards-p1" class="discards-row"></div>
      <div id="discards-p0" class="discards-row"></div>
    </div>
    
    <div id="action-buttons">
      <button id="btn-reach" disabled>リーチ</button>
      <button id="btn-pon" style="display:none">ポン</button>
      <button id="btn-chi" style="display:none">チー</button>
      <button id="btn-kan" style="display:none">カン</button>
      <button id="btn-ron" style="display:none">ロン/ツモ</button>
      <button id="btn-pass" style="display:none">パス</button>
    </div>
    
    <div id="hand-area"></div>
    
    <div id="debug-log"></div>
  </div>
  
  <script src="/static/js/main.js"></script>
</body>
</html>
