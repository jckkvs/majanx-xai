<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>majanx MVP UI</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
  <div id="game-board">
    <!-- 対局情報バー -->
    <div class="game-info-bar">
      <div class="round-info">
        <span class="round">東1局</span>
        <span class="honba">0本場</span>
        <span class="kyotaku">0</span>
      </div>
      <div class="turn-indicator">
        巡目: <span id="turn-count">1</span>
      </div>
      <div class="dora-indicator">
        ドラ: <span id="dora-tile">🀫</span>
      </div>
      <div class="riichi-sticks">
        供託: <span id="riichi-sticks">0</span>
      </div>
    </div>
    
    <!-- スコア表示 -->
    <div class="score-display top-score" data-player="2">
      <div class="score">25000</div>
    </div>
    <div class="score-display right-score" data-player="1">
      <div class="score">25000</div>
    </div>
    <div class="score-display left-score" data-player="3">
      <div class="score">25000</div>
    </div>
    <div class="score-display bottom-score" data-player="0">
      <div class="player-name">自分</div>
      <div class="score">25000</div>
    </div>

    <!-- 他家手牌（伏せ牌） -->
    <div class="player-top">
      <div class="opponent-hand" id="opponent-top-hand"></div>
    </div>
    <div class="player-right">
      <div class="opponent-hand" id="opponent-right-hand"></div>
    </div>
    <div class="player-left">
      <div class="opponent-hand" id="opponent-left-hand"></div>
    </div>

    <!-- 4方向の河 -->
    <div class="discard-rivers">
      <div class="river river-top" id="river-top" data-player="2"></div>
      <div class="river river-right" id="river-right" data-player="1"></div>
      <div class="river river-bottom" id="river-bottom" data-player="0"></div>
      <div class="river river-left" id="river-left" data-player="3"></div>
    </div>

    <!-- AI双視点パネル -->
    <div class="ai-panel" id="ai-panel" style="display: none;">
      <h3>🤖 Cognitive Mirror</h3>
      <div class="perspective-container">
        <!-- 視点A -->
        <div class="perspective-card" id="perspective-a">
          <div class="ai-name">AI A (Speed)</div>
          <div class="recommended-action">推奨: <span class="pai-badge">🀫</span></div>
          <div class="principle">原則...</div>
          <ul class="checklist"></ul>
        </div>
        <!-- 視点B -->
        <div class="perspective-card" id="perspective-b">
          <div class="ai-name">AI B (Rule)</div>
          <div class="recommended-action">推奨: <span class="pai-badge">🀫</span></div>
          <div class="principle">原則...</div>
          <ul class="checklist"></ul>
        </div>
      </div>
    </div>

    <!-- 自分手牌と操作 -->
    <div class="self-hand-area">
      <div class="self-hand" id="player-hand"></div>
      
      <div class="action-buttons">
        <button id="btn-reach" onclick="window.declareRiichi()" disabled>リーチ</button>
        <button id="btn-pon" onclick="window.callPon()" style="display:none">ポン</button>
        <button id="btn-chi" onclick="window.callChi()" style="display:none">チー</button>
        <button id="btn-kan" onclick="window.callKan()" style="display:none">カン</button>
        <button id="btn-ron" onclick="window.callRon()" style="display:none">ロン/ツモ</button>
        <button id="btn-pass" onclick="window.callPass()" style="display:none">パス</button>
        <button id="btn-discard" onclick="window.doDiscard()" disabled>打牌</button>
      </div>
    </div>
    
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
