<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>麻雀解説AI - 実戦モード</title>
  <meta name="description" content="AIが解説する本格四人麻雀。リアルタイムAI解析付き。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/tiles.css">
  <link rel="stylesheet" href="/static/css/table.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <style>
    /* center-discards grid center cell */
    .center-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* replay-bar hidden override */
    #replay-bar.hidden { display: none !important; }
    #replay-bar { display: flex; }
    
    /* AI meters new CSS */
    .ai-meters {
      display: flex; gap: 12px; margin-top: 8px; font-size: 12px;
    }
    .meter { flex: 1; }
    .meter-bar {
      height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-top: 4px;
    }
    .meter-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease-out; }
    .meter-fill.atk { background: linear-gradient(90deg, #ef4444, #f97316); }
    .meter-fill.def { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
  </style>
</head>
<body>
<div id="app">

  <!-- ========== スタート画面 ========== -->
  <div id="start-screen" class="screen active">
    <div class="start-container">
      <div class="logo-container">
        <div class="logo">
          <span class="logo-icon">🀄</span>
          <span class="logo-text">麻雀AI</span>
        </div>
        <p class="logo-subtitle">EXPLAINABLE MAHJONG AI — 実戦モード</p>
      </div>

      <div class="start-menu">
        <button id="btn-start-game" class="btn btn-primary btn-lg">
          <span class="btn-icon">▶</span> 対局を始める
        </button>

        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center;">
          <label for="replay-file" class="btn btn-secondary" style="cursor:pointer;">
            <span class="btn-icon">📁</span> 牌譜を開く
          </label>
          <input type="file" id="replay-file" accept=".log,.json" style="display:none;">
          <button id="btn-start-replay" class="btn btn-secondary">読み込み開始</button>
        </div>

        <a href="/settings.html" class="btn btn-secondary" style="font-size:0.9rem; text-decoration:none;">⚙ 設定</a>
      </div>

      <div class="version-info">v3.0 Phase 3 | Explainable Mahjong AI</div>
    </div>
  </div>

  <!-- ========== ゲーム画面 ========== -->
  <div id="game-screen" class="screen">

    <!-- リプレイバー (牌譜再生時のみ表示) -->
    <div id="replay-bar" class="hidden" style="position:fixed; top:48px; left:50%; transform:translateX(-50%); z-index:50; gap:8px; padding:4px 16px; background:rgba(10,14,23,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:0 0 8px 8px;">
      <button id="btn-replay-prev" class="btn btn-secondary" style="padding:4px 12px; font-size:12px;">← 前へ</button>
      <button id="btn-replay-next" class="btn btn-primary" style="padding:4px 12px; font-size:12px;">次へ →</button>
    </div>

    <!-- 左上：ドラ・赤ドラ表示 -->
    <div class="top-hud">
      <div class="dora-label">ドラ</div>
      <div id="dora-indicators" class="dora-tiles"></div>
    </div>

    <!-- 左側：設定メニュー -->
    <div class="sidebar">
      <div class="sidebar-item" onclick="this.querySelector('.toggle-dot').classList.toggle('off'); this.querySelector('.toggle-dot').classList.toggle('on');">
        <div class="toggle-dot on"></div>
        <span class="sidebar-text">自動整理</span>
      </div>
      <div class="sidebar-item" onclick="this.querySelector('.toggle-dot').classList.toggle('off'); this.querySelector('.toggle-dot').classList.toggle('on');">
        <div class="toggle-dot off"></div>
        <span class="sidebar-text">自動和了</span>
      </div>
      <div class="sidebar-item" onclick="this.querySelector('.toggle-dot').classList.toggle('off'); this.querySelector('.toggle-dot').classList.toggle('on');">
        <div class="toggle-dot off"></div>
        <span class="sidebar-text">鳴きなし</span>
      </div>
      <div class="sidebar-item" onclick="this.querySelector('.toggle-dot').classList.toggle('off'); this.querySelector('.toggle-dot').classList.toggle('on');">
        <div class="toggle-dot off"></div>
        <span class="sidebar-text">ツモ切り</span>
      </div>
      <div class="sidebar-item" onclick="this.querySelector('.toggle-dot').classList.toggle('off'); this.querySelector('.toggle-dot').classList.toggle('on');">
        <div class="toggle-dot on"></div>
        <span class="sidebar-text">自動北抜き</span>
      </div>
    </div>

    <!-- Floating Score (初期非表示) -->
    <div id="floating-score" class="floating-score hidden">
      <div class="score-tile z" id="fs-tile">北</div>
      <div class="score-text"><span id="fs-count">4</span> <span id="fs-delta">+20</span></div>
    </div>

    <!-- 情報バー (Center-shieldに統合されたため削除) -->

    <!-- メイン麻雀テーブル (grid: top / left + center + right / bottom) -->
    <div class="mahjong-table">

      <!-- 対面: CPU3 (seat 2) -->
      <div class="player-area player-top">
        <div class="player-info">
          <span id="wind-2" class="player-wind">西</span>
          <span class="player-name">CPU 3</span>
          <span id="score-2" class="player-score">25000</span>
        </div>
        <div id="melds-2" class="meld-area"></div>
        <div id="hand-2" class="hand-area hand-top"></div>
      </div>

      <!-- 上家: CPU4 (seat 3) -->
      <div class="player-area player-left">
        <div class="player-info" style="flex-direction:column; gap:8px; padding:12px 10px;">
          <span id="wind-3" class="player-wind" style="font-size:var(--font-size-sm); width:32px; height:32px;">北</span>
          <span class="player-name" style="font-size:var(--font-size-md); writing-mode:vertical-rl; letter-spacing:0.1em;">CPU 4</span>
          <span id="score-3" class="player-score" style="font-size:var(--font-size-md); writing-mode:vertical-rl;">25000</span>
        </div>
        <div id="hand-3" class="hand-area hand-left"></div>
        <div id="melds-3" class="meld-area" style="flex-direction:column; gap:4px;"></div>
      </div>

      <!-- 中央: 捨て牌エリア -->
      <div class="table-center">
        <div class="center-discards">
          <!-- 対面の捨て牌 (seat 2) -->
          <div id="discards-2" class="discard-area center-discard-top">
            <div class="discard-label">CPU3</div>
          </div>
          <!-- 上家の捨て牌 (seat 3) -->
          <div id="discards-3" class="discard-area center-discard-left">
            <div class="discard-label">CPU4</div>
          </div>
          <!-- 中央セル -->
          <div class="center-cell" style="position:relative;">
            <div class="center-shield">
              <div class="round-info">
                <span id="round-name" class="round-name">東1局</span>
                <span id="honba" class="honba"></span>
              </div>
              <div class="tile-count">残り <span id="tiles-remaining">70</span></div>
              <div class="turn-display" style="justify-content:center; font-size:var(--font-size-sm); margin-bottom:4px;">
                <span class="turn-label">巡目</span>
                <span id="turn-count" class="turn-count">-</span>
              </div>
              <div id="riichi-sticks" class="riichi-sticks" style="position:absolute; bottom:5px; left:50%; transform:translateX(-50%); flex-direction:row; gap:4px;"></div>
            </div>
            <div id="action-indicator" class="action-indicator" style="position:absolute; top: -30px; left:50%; transform:translateX(-50%);"></div>
          </div>
          <!-- 下家の捨て牌 (seat 1) -->
          <div id="discards-1" class="discard-area center-discard-right">
            <div class="discard-label">CPU2</div>
          </div>
          <!-- 自分の捨て牌 (seat 0) -->
          <div id="discards-0" class="discard-area center-discard-bottom">
            <div class="discard-label">あなた</div>
          </div>
        </div>
      </div>

      <!-- 下家: CPU2 (seat 1) -->
      <div class="player-area player-right">
        <div id="melds-1" class="meld-area" style="flex-direction:column; gap:4px;"></div>
        <div id="hand-1" class="hand-area hand-right"></div>
        <div class="player-info" style="flex-direction:column; gap:8px; padding:12px 10px;">
          <span id="wind-1" class="player-wind" style="font-size:var(--font-size-sm); width:32px; height:32px;">南</span>
          <span class="player-name" style="font-size:var(--font-size-md); writing-mode:vertical-rl; letter-spacing:0.1em;">CPU 2</span>
          <span id="score-1" class="player-score" style="font-size:var(--font-size-md); writing-mode:vertical-rl;">25000</span>
        </div>
      </div>

      <!-- 自分 (seat 0) -->
      <div class="player-area player-bottom">
        <div id="melds-0" class="meld-area meld-bottom"></div>
        <div id="hand-0" class="hand-area hand-bottom"></div>
        <div class="player-info player-info-bottom">
          <span id="wind-0" class="player-wind">東</span>
          <span class="player-name-self">あなた</span>
          <span id="score-0" class="player-score">25000</span>
        </div>
      </div>

    </div><!-- /mahjong-table -->

    <!-- 向聴数表示 (fixed) -->
    <div id="shanten-display" class="shanten-display hidden">
      <span id="shanten-value">-</span>
    </div>

    <!-- アクションバー (fixed bottom-center) -->
    <div id="action-bar" class="action-bar hidden">
      <div id="action-buttons" class="action-buttons"></div>
    </div>

    <!-- 最新AI推奨オーバーレイ -->
    <div class="ai-overlay" id="ai-overlay" style="display:none;">
      <div style="font-size:12px; color:#64b5f6;">🤖 最新AI推奨</div>
      <div class="ai-tile" id="ai-rec-tile">-</div>
      <div class="ai-reason" id="ai-reasoning">解析待機中...</div>
      <div class="ai-meters">
        <div class="meter">
          <div>⚔️ 攻め <span id="atk-val">0</span></div>
          <div class="meter-bar"><div class="meter-fill atk" id="atk-bar" style="width:0%"></div></div>
        </div>
        <div class="meter">
          <div>🛡️ 守り <span id="def-val">0</span></div>
          <div class="meter-bar"><div class="meter-fill def" id="def-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <!-- 結果オーバーレイ -->
    <div id="result-overlay" class="overlay hidden">
      <div class="result-container">
        <div id="result-content" class="result-content"></div>
        <div style="display:flex; gap:12px; justify-content:center; margin-top:16px;">
          <button id="btn-next-round" class="btn btn-primary hidden">次の局へ →</button>
          <button id="btn-back-to-start" class="btn btn-secondary hidden">タイトルへ</button>
        </div>
      </div>
    </div>

    <!-- 流局結果モーダル -->
    <div id="ryukyoku-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🀄 流局</h2>
          <div class="round-info" id="ryukyoku-round">東1局</div>
        </div>
        
        <!-- 手牌公開エリア -->
        <div class="hands-reveal">
          <div class="player-hand-reveal" id="hand-reveal-0"></div>
          <div class="player-hand-reveal" id="hand-reveal-1"></div>
          <div class="player-hand-reveal" id="hand-reveal-2"></div>
          <div class="player-hand-reveal" id="hand-reveal-3"></div>
        </div>
        
        <!-- 聴牌状況 -->
        <div class="tenpai-status">
          <div class="status-item" id="tenpai-0"></div>
          <div class="status-item" id="tenpai-1"></div>
          <div class="status-item" id="tenpai-2"></div>
          <div class="status-item" id="tenpai-3"></div>
        </div>
        
        <!-- 点数移動アニメーション -->
        <div class="score-animation" id="score-anim"></div>
        
        <!-- 結果サマリー -->
        <div class="result-summary">
          <div class="summary-item total">
            <span>最終点数</span>
            <span id="final-score">0</span>
          </div>
        </div>
        
        <!-- 進行ボタン -->
        <div class="modal-actions">
          <button id="btn-ryukyoku-next" class="btn btn-primary">次の局へ →</button>
        </div>
      </div>
    </div>

  </div><!-- /game-screen -->
</div><!-- /app -->

<script src="/static/js/tile-renderer.js"></script>
<script src="/static/js/game-client.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
